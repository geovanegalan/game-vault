<!doctype html>
<html data-bs-theme="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Game Vault - Library</title>
    <link rel="stylesheet" href="../../../assets/styles/library.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <a class="sidebar-brand" href="../index/index.html">GV</a>
      <nav class="d-flex flex-column align-items-center w-100 px-2 gap-3">
        <a class="nav-icon active" href="#">
          <span class="material-symbols-outlined filled">library_books</span>
          <span class="text">Library</span>
        </a>
        <a class="nav-icon" href="#">
          <span class="material-symbols-outlined">explore</span>
          <span class="text">Explore</span>
        </a>
        <a
          class="nav-icon"
          data-bs-target="#addArtifactModal"
          data-bs-toggle="modal"
          href="#"
        >
          <span class="material-symbols-outlined">add_circle</span>
          <span class="text">Add</span>
        </a>
      </nav>
      <div class="mt-auto d-flex flex-column align-items-center gap-4">
        <button class="btn btn-link nav-icon p-0 m-0 border-0">
          <span class="material-symbols-outlined">settings</span>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <header class="top-header">
        <div class="d-flex align-items-center w-100">
          <picture>
            <source
              srcset="/game-vault/assets/resources/images/logo_v2.webp"
              type="image/webp"
            />
            <img
              src="/game-vault/assets/resources/images/logo_v2.png"
              alt="Game Vault logo"
              class="logo"
            />
          </picture>
          <div class="search-container">
            <span class="material-symbols-outlined search-icon">search</span>
            <input
              class="search-input"
              placeholder="Search the vault..."
              type="text"
            />
          </div>
        </div>
        <div class="d-flex align-items-center gap-4 ms-auto">
          <span class="material-symbols-outlined fs-1">account_circle</span>
        </div>
      </header>

      <section class="content-area">
        <div
          class="d-flex justify-content-between align-items-baseline mb-5 mt-4"
        >
          <h2 class="section-title fs-2">Library</h2>
          <nav class="filter-nav">
            <a class="filter-link active" href="#">All Games</a>
            <a class="filter-link" href="#">Favorites</a>
            <a class="filter-link" href="#">Backlog</a>
          </nav>
        </div>

        <div
          class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-4"
          id="library-container"
        >
          <!-- ADD GAME-->
          <div class="col">
            <button
              class="add-artifact-btn h-100"
              data-bs-target="#addArtifactModal"
              data-bs-toggle="modal"
            >
              <span class="material-symbols-outlined icon">add_box</span>
              <span class="text">Add Game</span>
            </button>
          </div>
          
      </section>

      <footer class="footer">
        <div class="footer-links">
          <a href="#" class="text-decoration-none text-secondary-vault"
            >System Status</a
          >
          <a href="#" class="text-decoration-none text-secondary-vault"
            >Privacy Policy</a
          >
          <a href="#" class="text-decoration-none text-secondary-vault"
            >Terms of Service</a
          >
        </div>
        <div class="text-secondary-vault">&copy; 2026 Game Vault</div>
      </footer>
    </main>

    <!-- MODAL: Add Game-->
    <div
      aria-hidden="true"
      aria-labelledby="addArtifactModalLabel"
      class="modal fade"
      id="addArtifactModal"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content obsidian-vault bg-grey-container">
          <div class="modal-header obsidian-vault border-bottom-0 pb-0">
            <h5 class="modal-title" id="addArtifactModalLabel">Add to Vault</h5>
            <button
              aria-label="Close"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              type="button"
            ></button>
          </div>
          <div class="modal-body p-4">

            <div class="search-container w-100 ms-0 mb-4">
              <span class="material-symbols-outlined search-icon">search</span>

              <input
                class="search-input"
                id="gameSearchInput"
                placeholder="Search for a game to add..."
                type="text"
              />
            </div>


            <h6
              class="text-uppercase text-muted fw-bold mb-3"
              style="font-size: 0.65rem; letter-spacing: 0.1em"
            >
              Recent Discoveries
            </h6>

            <div class="row row-cols-2 row-cols-md-4 g-3" id="searchResults"></div>
            
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="library.js"></script>
  </body>
</html>
