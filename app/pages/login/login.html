<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Vault - Login</title>
    <link rel="stylesheet" href="../../../assets/styles/login.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-auth">
    <div class="min-vh-100 d-flex align-items-center justify-content-center">
      <div class="row w-100 justify-content-center">
        <div style="max-width: 420px">
          <div
            class="d-flex flex-column align-items-center bg-grey-container p-5 rounded-4 shadow-sm"
          >
            <picture>
              <source
                srcset="/assets/resources/images/logo_v2.webp"
                type="image/webp"
              />
              <img
                src="/assets/resources/images/logo_v2.png"
                alt="Game Vault logo"
                class="logo"
              />
            </picture>
            <form action="#" class="w-100 d-flex flex-column gap-4 mt-5 mb-4">
              <div>
                <label
                  for="email"
                  class="form-label text-uppercase fs-6 fw-bold text-secondary-vault"
                >
                  Credentials
                </label>
                <input
                  type="text"
                  id="email"
                  name="email"
                  class="form-control bg-black text-primary-vault border-black-containers"
                  placeholder="Username or E-mail"
                />
              </div>
              <div>
                <div class="d-flex justify-content-between">
                  <label
                    for="password"
                    class="form-label text-uppercase fs-6 fw-bold text-secondary-vault"
                  >
                    Password
                  </label>
                  <a
                    href="#"
                    class="text-ultraviolet fw-bold text-uppercase fs-6 text-decoration-none"
                  >
                    Forgot password?
                  </a>
                </div>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control bg-black text-primary-vault border-black-containers"
                  placeholder="•••••••••••••"
                />
              </div>
              <div class="form-check">
                <input
                  type="checkbox"
                  id="remember"
                  class="form-check-input bg-transparent border-secondary-vault"
                />
                <label
                  for="remember"
                  class="form-check-label text-secondary-vault fs-6"
                >
                  Maintain Session
                </label>
              </div>
              <button type="submit" class="btn btn-primary-ultraviolet">
                Enter
              </button>
            </form>
            <div
              class="w-100 pt-3 d-flex flex-column align-items-center border-top border-white border-opacity-10"
            >
              <p class="text-secondary-vault fs-6 mb-2">
                New artifact curator?
              </p>
              <a
                href="../register/register.html"
                class="btn btn-sm text-uppercase fw-bold fs-6 text-secondary-vault border border-secondary-vault rounded-pill px-4"
              >
                Request Credentials
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
